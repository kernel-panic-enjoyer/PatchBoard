name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7.0.0

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: moderate
