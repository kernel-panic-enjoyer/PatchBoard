name: Browser UI CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  browser:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tests/browser
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: tests/browser/go.mod
          cache-dependency-path: tests/browser/go.sum

      - name: Report browser availability
        shell: pwsh
        run: |
          $candidates = @(
            "$env:ProgramFiles\Microsoft\Edge\Application\msedge.exe",
            "${env:ProgramFiles(x86)}\Microsoft\Edge\Application\msedge.exe",
            "$env:LOCALAPPDATA\Microsoft\Edge\Application\msedge.exe",
            "$env:ProgramFiles\Google\Chrome\Application\chrome.exe",
            "${env:ProgramFiles(x86)}\Google\Chrome\Application\chrome.exe",
            "$env:LOCALAPPDATA\Google\Chrome\Application\chrome.exe"
          )
          $found = $candidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if ($found) {
            "Browser found: $found"
          } else {
            "No Edge/Chrome executable found; browser tests are expected to skip through their own discovery guard."
          }

      - name: Browser tests
        run: go test -count=1 -tags uitestsupport ./...

      - name: Static analysis
        shell: pwsh
        run: |
          $tools = Join-Path $env:RUNNER_TEMP 'go-security-tools'
          New-Item -ItemType Directory -Force -Path $tools | Out-Null
          $env:GOBIN = $tools
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          & (Join-Path $tools 'staticcheck.exe') -tags=uitestsupport ./...

      - name: Go vulnerability scan
        shell: pwsh
        run: |
          $tools = Join-Path $env:RUNNER_TEMP 'go-security-tools'
          New-Item -ItemType Directory -Force -Path $tools | Out-Null
          $env:GOBIN = $tools
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          & (Join-Path $tools 'govulncheck.exe') ./...
