name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix, for example 0.0.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Validate release input
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -ne 'refs/heads/main') {
            throw 'Release workflow must run from main.'
          }
          if ('${{ inputs.version }}' -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw 'Version must be semantic, for example 0.0.1.'
          }

      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Go vulnerability scan
        shell: pwsh
        run: |
          $tools = Join-Path $env:RUNNER_TEMP 'go-security-tools'
          New-Item -ItemType Directory -Force -Path $tools | Out-Null
          $env:GOBIN = $tools
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          & (Join-Path $tools 'govulncheck.exe') ./...

      - name: Static analysis
        shell: pwsh
        run: |
          $tools = Join-Path $env:RUNNER_TEMP 'go-security-tools'
          New-Item -ItemType Directory -Force -Path $tools | Out-Null
          $env:GOBIN = $tools
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          & (Join-Path $tools 'staticcheck.exe') ./...

      - name: JavaScript type check
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm run check:js

      - name: Build and validate
        shell: pwsh
        env:
          PATCHBOARD_UPDATE_SIGNING_KEY_ID: ${{ vars.PATCHBOARD_UPDATE_SIGNING_KEY_ID }}
          PATCHBOARD_UPDATE_SIGNING_PUBLIC_KEYS: ${{ vars.PATCHBOARD_UPDATE_SIGNING_PUBLIC_KEYS }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PATCHBOARD_UPDATE_SIGNING_KEY_ID) -or [string]::IsNullOrWhiteSpace($env:PATCHBOARD_UPDATE_SIGNING_PUBLIC_KEYS)) {
            throw 'Release signing configuration is required.'
          }
          powershell -NoProfile -ExecutionPolicy Bypass -File .\dev\scripts\Build-Workspace.ps1 `
            -Version '${{ inputs.version }}' `
            -Strip `
            -UpdateSigningKeyID $env:PATCHBOARD_UPDATE_SIGNING_KEY_ID `
            -UpdateSigningPublicKeys $env:PATCHBOARD_UPDATE_SIGNING_PUBLIC_KEYS

      - name: Distribution smoke
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\dev\scripts\Smoke-Distribution.ps1 -Exe .\dist\PatchBoard.exe

      - name: Generate checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath .\dist\PatchBoard.exe).Hash.ToLowerInvariant()
          "$hash  PatchBoard.exe" | Set-Content -LiteralPath .\dist\PatchBoard.exe.sha256 -Encoding ascii

      - name: Sign self-update release metadata
        shell: pwsh
        env:
          PATCHBOARD_UPDATE_SIGNING_KEY_ID: ${{ vars.PATCHBOARD_UPDATE_SIGNING_KEY_ID }}
          PATCHBOARD_UPDATE_SIGNING_PRIVATE_KEY: ${{ secrets.PATCHBOARD_UPDATE_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PATCHBOARD_UPDATE_SIGNING_PRIVATE_KEY)) {
            throw 'PATCHBOARD_UPDATE_SIGNING_PRIVATE_KEY is required.'
          }
          go run .\dev\tools\release-sign `
            -metadata .\dist\PatchBoard.metadata.json `
            -output .\dist\PatchBoard.update-signature.json `
            -key-id $env:PATCHBOARD_UPDATE_SIGNING_KEY_ID

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" `
            .\dist\PatchBoard.exe `
            .\dist\PatchBoard.metadata.json `
            .\dist\PatchBoard.exe.sha256 `
            .\dist\PatchBoard.update-signature.json `
            --target "$env:GITHUB_SHA" `
            --title "PatchBoard v${{ inputs.version }}" `
            --notes "CI-built PatchBoard.exe release."
